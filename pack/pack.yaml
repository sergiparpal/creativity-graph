# Conceptual-theory domain pack (Stage 2), authored from examples/source.md.
# Node/edge types absent from these lists are routed to the `undeclared-type` bucket by the boundary.
domain: "conceptual theory"
version: "0.1.0"

# §1.4: compressions/primitives vs claims vs operations.
node_types:
  - compression      # an idea standing in for many observations (predicts to earn its keep)
  - primitive        # an irreducible defined term
  - claim            # an assertion relating nodes
  - metric           # a measurement (degree, betweenness, specificity)
  - operation        # a process the theory performs (grounding, projection, reconciliation)
  - failure          # a recorded falsified claim (negative information)

# Relation types the theory actually uses (drawn from the source prose).
edge_types:
  # Directed edges read  HEAD <relation> TAIL.  Reversing HEAD/TAIL was the dominant Stage-4 miss
  # (precision 0.61, span-support 0.94: the span is right, the direction/type is wrong). These per-type
  # comments are human-reference only — they never reach the model; agents/extractor.md is the live lever.
  - grounds          # HEAD = evidence/foundation, TAIL = claim it supports. NOT part-of.
  - attacked_by      # HEAD = victim (vaguer), TAIL = attacker (stronger/more specific).
  - reconciles_with  # HEAD resolves a real tension TAIL left open. NOT mere complement/contrast.
  - bridges          # HEAD joins two separate communities. NOT instance-of/evidence-of, NOT paired maxims.
  - collapses_into   # HEAD reduces to / is subsumed by TAIL. NOT "is a clause/risk of", NOT "opposite extreme of".
  - confounded_by    # HEAD's apparent value is inflated by TAIL.
  - approximates     # HEAD = cheap proxy, TAIL = the truer target it stands in for. NOT instance-of, NOT "related but distinct".
  - defends_against  # HEAD = remedy/defense, TAIL = threat/problem. The problem is the TAIL.
  - projects         # HEAD = regenerable projection, TAIL = source it derives from. NOT "reveals / makes-detectable".
  - survives         # HEAD = claim/info that persists, TAIL = the operation it survives (TAIL must be an `operation`).

glossary:
  compression: "A single idea that stands in for many observations; earns its keep only when it predicts."
  generality confound: "Failure mode where a vague idea accumulates spurious connections and looks central."
  span-present: "A claim that cites a verbatim textual span a reader can check."
  inferred: "A claim asserted without a verifiable span."
  bridge: "A node that joins two otherwise separate communities of ideas."
  betweenness: "How often a node lies on shortest paths; the natural but confounded bridge metric."
  specificity-weighted betweenness: "Betweenness weighted by term rarity; the gated bridge metric."
  degree: "Count of a node's connections; the honest advisory for importance."
  failed: "A claim that has been actively falsified; recorded as negative information, never pruned."
  negative information: "The record of what was refuted, which defends against re-proposal."
  canon: "The human-editable source of truth carrying the grounding state."
  derived: "The regenerable, disposable projection of the canon."

# Per-term specificity seeds (IDF-like; higher = rarer/more specific). The harness recomputes IDF over
# the corpus; these are starting hints so vague terms are not mistaken for bridges (§1.6).
specificity_seeds:
  idea: 0.4
  system: 0.4
  thing: 0.2
  claim: 0.8
  betweenness: 2.4
  specificity: 2.2
  compression: 2.0
  generality: 1.6
  confound: 2.1
  reconciler: 2.3
  falsification: 2.3
